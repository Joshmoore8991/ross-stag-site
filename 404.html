<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 - BARCELONA STAG</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F1EA;&#x1F1F8;</text></svg>">
<link rel="stylesheet" href="rossstag.css">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .err-box { text-align: center; max-width: 560px; }
  .err-code { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 15vw, 8rem); line-height: 1; color: var(--gold, #D4AF37); margin: 0; letter-spacing: .05em; }
  .err-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.5rem, 5vw, 2.5rem); margin: .5rem 0 1rem; letter-spacing: .1em; }
  .err-msg { opacity: .85; margin-bottom: 2rem; line-height: 1.6; }
  .err-btn { display: inline-block; padding: .9rem 2rem; background: var(--gold, #D4AF37); color: #0A0A0A; text-decoration: none; font-weight: 700; border-radius: 6px; letter-spacing: .05em; transition: transform .2s ease; }
  .err-btn:hover, .err-btn:focus { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="err-box">
    <p class="err-code">404</p>
    <h1 class="err-title">Lost in Las Ramblas</h1>
    <p class="err-msg">This page has wandered off — probably chasing sangria. Let's get you back to the crew.</p>
    <a href="/" class="err-btn">&larr; Back to Stag HQ</a>
  </div>
</body>
</html>
